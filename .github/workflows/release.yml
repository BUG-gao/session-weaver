name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --locked --release
          strip: true
      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/session-weaver" dist/
          cp "target/${{ matrix.target }}/release/sw" dist/
          tar -C dist -czf "session-weaver-${{ matrix.target }}.tar.gz" session-weaver sw
          shasum -a 256 "session-weaver-${{ matrix.target }}.tar.gz" > "session-weaver-${{ matrix.target }}.sha256"
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item "target/${{ matrix.target }}/release/session-weaver.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/sw.exe" dist/
          Compress-Archive -Path dist/session-weaver.exe,dist/sw.exe -DestinationPath "session-weaver-${{ matrix.target }}.zip"
          (Get-FileHash "session-weaver-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  session-weaver-${{ matrix.target }}.zip" | Out-File "session-weaver-${{ matrix.target }}.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: session-weaver-${{ matrix.target }}
          path: session-weaver-${{ matrix.target }}.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: session-weaver-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: session-weaver-*
